services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mirage
      POSTGRES_PASSWORD: mirage123
      POSTGRES_DB: jobmarket
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  processor:
    build: ./processor-service
    depends_on:
      - postgres
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://mirage:mirage123@postgres:5432/jobmarket
    restart: on-failure

  scoring:
    build:
      context: .
      dockerfile: scoring-service/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://mirage:mirage123@postgres:5432/jobmarket
    volumes:
      - ./Model/artefacts:/app/artefacts
    restart: on-failure

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
      - scoring
    ports:
      - "4000:4000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://mirage:mirage123@postgres:5432/jobmarket
      PORT: 4000
      SCORING_SERVICE_URL: http://scoring:5000
      CHATBOT_SERVICE_URL: http://host.docker.internal:8000
    restart: on-failure

  scraper:
    build: ./scraper-service
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      SCRAPE_PAGES: 3
      RATE_LIMIT_MS: 800
      SCRAPE_INTERVAL: 600
    restart: on-failure

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    restart: on-failure

volumes:
  pgdata:
  frontend_node_modules:
